<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Veda Trader{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #050505;
            --bg-1: #0b0b0d;
            --bg-2: #111114;
            --ink: #e9e6dc;
            --mute: #8a8473;
            --gold-1: #f5d98a;
            --gold-2: #d4af37;
            --gold-3: #a17a1a;
            --gold-line: linear-gradient(90deg, transparent, #d4af37 20%, #f5d98a 50%, #d4af37 80%, transparent);
            --gold-glow: 0 0 18px rgba(212, 175, 55, 0.35);
            --gold-soft: rgba(212, 175, 55, 0.18);
            --green: #1bd29b;
            --red: #ff5577;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: var(--bg-0); color: var(--ink); }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(900px 600px at 15% -10%, rgba(212,175,55,0.08), transparent 60%),
                radial-gradient(800px 500px at 110% 10%, rgba(212,175,55,0.06), transparent 60%),
                radial-gradient(1200px 800px at 50% 120%, rgba(245,217,138,0.05), transparent 60%),
                linear-gradient(180deg, #050505 0%, #08080a 50%, #050505 100%);
        }
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            z-index: 0;
        }

        .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

        /* Top bar */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 24px;
            background: linear-gradient(180deg, #0a0a0c, #060607);
            border: 1px solid var(--gold-soft);
            border-radius: 14px;
            box-shadow: var(--gold-glow), inset 0 1px 0 rgba(245,217,138,0.08);
        }
        .brand {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 0.28em;
            font-size: 1.05rem;
            background: linear-gradient(180deg, #fff7d6, #d4af37 60%, #8a6a14);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 18px rgba(212,175,55,0.25);
        }
        .topbar nav a {
            color: var(--ink); text-decoration: none; margin-left: 24px;
            font-size: 0.92rem; letter-spacing: 0.08em; text-transform: uppercase;
            transition: color .2s;
        }
        .topbar nav a:hover { color: var(--gold-1); }

        /* Gold separator line */
        .gold-line {
            height: 1px; width: 100%;
            background: var(--gold-line);
            box-shadow: 0 0 12px rgba(212,175,55,0.4);
            margin: 28px 0;
        }

        /* Buttons */
        .btn {
            display: inline-block; padding: 14px 30px; border-radius: 999px;
            font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
            text-decoration: none; cursor: pointer; border: none;
            font-size: 0.85rem; transition: transform .15s, box-shadow .2s;
        }
        .btn-gold {
            background: linear-gradient(180deg, #f5d98a, #d4af37 60%, #a17a1a);
            color: #1a1306;
            box-shadow: 0 0 0 1px rgba(245,217,138,0.5) inset, 0 6px 24px rgba(212,175,55,0.35);
        }
        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(245,217,138,0.7) inset, 0 10px 32px rgba(212,175,55,0.5); }
        .btn-ghost {
            background: transparent; color: var(--gold-1);
            border: 1px solid var(--gold-2);
        }
        .btn-ghost:hover { background: rgba(212,175,55,0.08); }

        /* Cards / panels */
        .panel {
            background: linear-gradient(180deg, #0c0c0f 0%, #07070a 100%);
            border: 1px solid var(--gold-soft);
            border-radius: 16px;
            padding: 32px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(245,217,138,0.06);
        }
        .panel::after {
            content: ""; position: absolute; inset: 0; border-radius: 16px;
            pointer-events: none;
            background: radial-gradient(600px 200px at 50% 0%, rgba(212,175,55,0.08), transparent 70%);
        }

        .flash {
            background: rgba(255, 85, 119, 0.1);
            border: 1px solid rgba(255, 85, 119, 0.4);
            color: #ff8aa1;
            padding: 12px 16px; border-radius: 8px; margin-bottom: 18px;
            text-align: center; font-size: 0.9rem;
        }

        /* Footer */
        footer {
            text-align: center; padding: 40px 20px;
            color: var(--mute); font-size: 0.82rem;
            letter-spacing: 0.1em;
        }
        footer .cinzel { font-family: 'Cinzel', serif; color: var(--gold-2); letter-spacing: 0.3em; }

        @media (max-width: 640px) {
            .topbar { flex-direction: column; gap: 14px; }
            .topbar nav a { margin: 0 10px; }
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <div class="wrap">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
